services:

  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: admintoolbox
      POSTGRES_USER: admintoolbox
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admintoolbox"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://admintoolbox:${DB_PASSWORD}@db:5432/admintoolbox
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: https://${DOMAIN}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    # Port 3001 ist nur intern erreichbar — kein direkter Zugriff von außen

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # Let's Encrypt Zertifikate (persistent)
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
