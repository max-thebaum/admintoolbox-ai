<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdminToolbox — Network Admin Tools</title>
  <meta name="description" content="Professionelle Netzwerk-Tools für Admins: Subnet-Rechner, Speed-Rechner und mehr." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    (function() {
      const saved = localStorage.getItem('admintoolbox-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
      else if (window.matchMedia('(prefers-color-scheme: light)').matches)
        document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
</head>
<body>

  <header class="nav-header" id="nav-header">
    <nav class="nav-inner" aria-label="Hauptnavigation">
      <a href="#home" class="nav-logo" aria-label="AdminToolbox Home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="2" y="3" width="6" height="4" rx="1" fill="currentColor" opacity="0.9"/>
          <rect x="16" y="3" width="6" height="4" rx="1" fill="currentColor" opacity="0.9"/>
          <rect x="9" y="10" width="6" height="4" rx="1" fill="currentColor"/>
          <rect x="2" y="17" width="6" height="4" rx="1" fill="currentColor" opacity="0.6"/>
          <rect x="16" y="17" width="6" height="4" rx="1" fill="currentColor" opacity="0.6"/>
          <line x1="5" y1="7" x2="5" y2="17" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          <line x1="19" y1="7" x2="19" y2="17" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          <line x1="5" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          <line x1="15" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
        </svg>
        <span>AdminToolbox</span>
      </a>

      <ul class="nav-list" id="nav-list" role="list"></ul>

      <div class="nav-actions">
        <div class="lang-switcher" id="lang-switcher" aria-label="Language / Sprache">
          <button class="lang-btn" data-lang="de">DE</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>

        <button class="theme-toggle" id="theme-toggle" aria-label="Dark/Light Mode umschalten">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
            <line x1="12" y1="2" x2="12" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="20" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="2" y1="12" x2="4" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="20" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <button class="nav-burger" id="nav-burger" aria-label="Menü öffnen" aria-expanded="false" aria-controls="nav-list">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>
  </header>

  <main class="page-layout" id="page-layout">
    <aside class="tool-sidebar" id="tool-sidebar" hidden aria-label="Tools in dieser Kategorie"></aside>
    <section class="tool-area" aria-live="polite" aria-atomic="false">
      <div id="tool-container" class="tool-container">
        <div class="page-loading"><div class="spinner"></div></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <a href="#home" class="footer-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="2" y="3" width="6" height="4" rx="1" fill="currentColor" opacity="0.9"/>
            <rect x="16" y="3" width="6" height="4" rx="1" fill="currentColor" opacity="0.9"/>
            <rect x="9" y="10" width="6" height="4" rx="1" fill="currentColor"/>
            <rect x="2" y="17" width="6" height="4" rx="1" fill="currentColor" opacity="0.6"/>
            <rect x="16" y="17" width="6" height="4" rx="1" fill="currentColor" opacity="0.6"/>
          </svg>
          AdminToolbox
        </a>
        <p class="footer-tagline" data-i18n="footer.tagline">Professionelle Netzwerk-Tools
für Systemadministratoren.</p>
      </div>
      <div class="footer-col">
        <h4>Navigation</h4>
        <a href="#home" data-i18n="footer.nav.home">Home</a>
      </div>
      <div class="footer-col">
        <h4>Rechtliches</h4>
        <a href="#impressum">Impressum</a>
        <a href="#datenschutz">Datenschutz</a>
        <a href="#admin">Admin</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span>AdminToolbox &copy; <span id="footer-year"></span></span>
      <span class="footer-tagline-bottom" data-i18n="footer.motto">Idee: Mensch 💡 — Code: KI 🤖 — Haftung: keine</span>
    </div>
  </footer>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
