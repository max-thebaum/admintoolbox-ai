services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: admintoolbox
      POSTGRES_USER: admintoolbox
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
